<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chemsex-patroon</title>
  <link rel="stylesheet" href="../css/mobile.css" type="text/css" />
  <link rel="stylesheet" href="../css/forms.css" type="text/css" />
  <style>
    :root {
      --ink: #1b2f3f;
      --main: #4f2a74;
      --accent: #0f8a7a;
      --soft: #f8f2ff;
    }
    body {
      background:
        radial-gradient(circle at top right, rgba(79, 42, 116, 0.16), transparent 34%),
        linear-gradient(180deg, #fff 0%, #f8f3ff 100%);
      color: var(--ink);
    }
    .page-shell { max-width: 920px; margin: 0 auto; }
    .page-header {
      background: linear-gradient(140deg, var(--main) 0%, #7a2e60 100%);
      color: #fff;
      border-radius: 18px;
      padding: 1.4rem;
      box-shadow: 0 14px 32px rgba(27, 47, 63, 0.16);
    }
    .top-links { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.9rem; }
    .top-links a {
      color: #fff;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 0.5rem 0.85rem;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      font-weight: 600;
    [data-nl] { display: revert; }
    .question-card, .message {
      background: rgba(255,255,255,0.95);
      border-radius: 16px;
      padding: 1.1rem;
      margin-top: 1rem;
      box-shadow: 0 8px 22px rgba(27, 47, 63, 0.09);
    }
    .question-card { border-top: 4px solid var(--main); }
    .grid-two { display: grid; gap: 1rem; }
    @media (min-width: 760px) { .grid-two { grid-template-columns: 1fr 1fr; } }
    .action-bar { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 1.2rem; }
    .action-bar button { flex: 1 1 180px; }
    .message { display: none; border-left: 4px solid var(--accent); }
    .message.show { display: block; }
    .message.error { border-left-color: #b23a48; }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-shell">
      <header class="page-header">
        <div class="top-links">
          <a href="./chemsex.htm">Terug naar Chemsex</a>
          <a href="./chemsex-noodplan.htm">Volgende: noodplan</a>
          
        </div>
        <h1>Mijn chemsex-patroon</h1>
        <p>Werkblad om zonder oordeel te zien wat er gebeurt: wanneer, met wie, welke middelen, en hoe de comedown uitpakt.</p>
      </header>

      <div id="message" class="message"></div>

      <form id="chemsexPatternForm">
        <div class="grid-two">
          <section class="question-card">
            <h2>1. Context</h2>
            <div class="form-group">
              <label for="sessionMoment">Wanneer gebeurt dit meestal?</label>
              <textarea id="sessionMoment" rows="4"></textarea>
            </div>
            <div class="form-group">
              <label for="sessionPeople">Met wie of in welke setting?</label>
              <textarea id="sessionPeople" rows="4"></textarea>
            </div>
          </section>

          <section class="question-card">
            <h2>2. Middelen</h2>
            <div class="form-group">
              <label for="sessionSubstances">Welke middelen en combinaties gebruik je?</label>
              <textarea id="sessionSubstances" rows="4"></textarea>
            </div>
            <div class="form-group">
              <label for="sessionDoseTiming">Hoe loopt dosering en timing meestal?</label>
              <textarea id="sessionDoseTiming" rows="4"></textarea>
            </div>
          </section>
        </div>

        <div class="grid-two">
          <section class="question-card">
            <h2>3. Wat levert het op?</h2>
            <div class="form-group">
              <label for="sessionPositives">Wat zoek je (opwinding, verbinding, ontsnapping, controleverlies)?</label>
              <textarea id="sessionPositives" rows="5"></textarea>
            </div>
          </section>

          <section class="question-card">
            <h2>4. Wat kost het?</h2>
            <div class="form-group">
              <label for="sessionCosts">Welke prijs betaal je achteraf?</label>
              <textarea id="sessionCosts" rows="5"></textarea>
            </div>
          </section>
        </div>

        <div class="grid-two">
          <section class="question-card">
            <h2>5. Comedown</h2>
            <div class="form-group">
              <label for="comedownBody">Fysiek (slaap, uitputting, lichaam)?</label>
              <textarea id="comedownBody" rows="4"></textarea>
            </div>
            <div class="form-group">
              <label for="comedownMind">Mentaal (angst, schaamte, dip, leegte)?</label>
              <textarea id="comedownMind" rows="4"></textarea>
            </div>
          </section>

          <section class="question-card">
            <h2>6. Volgende keer</h2>
            <div class="form-group">
              <label for="earlySignals">Wat zijn je vroege signalen dat het richting escalatie gaat?</label>
              <textarea id="earlySignals" rows="4"></textarea>
            </div>
            <div class="form-group">
              <label for="nextChange">Wat wil je 1 stap anders doen bij de volgende sessie?</label>
              <textarea id="nextChange" rows="4"></textarea>
            </div>
          </section>
        </div>

        <div class="action-bar">
          <button type="button" class="button-primary" id="saveButton">Opslaan op dit toestel</button>
          <button type="button" class="button-secondary" id="exportButton">Exporteer alles als JSON</button>
          <button type="button" class="button-secondary" id="printButton">Print of bewaar als pdf</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/dataStore.js"></script>
  <script>
    const formKey = 'chemsex-patroon';
    const fields = [
      'sessionMoment',
      'sessionPeople',
      'sessionSubstances',
      'sessionDoseTiming',
      'sessionPositives',
      'sessionCosts',
      'comedownBody',
      'comedownMind',
      'earlySignals',
      'nextChange'
    ];

    function showMessage(text, isError = false) {
      const message = document.getElementById('message');
      message.textContent = text;
      message.classList.add('show');
      message.classList.toggle('error', isError);
      clearTimeout(showMessage.timer);
      showMessage.timer = setTimeout(() => message.classList.remove('show'), 2800);
    }

    function collectFormData() {
      const result = {};
      fields.forEach((id) => {
        const el = document.getElementById(id);
        result[id] = el ? el.value.trim() : '';
      });
      return result;
    }

    function fillForm(data) {
      fields.forEach((id) => {
        const el = document.getElementById(id);
        if (el) el.value = data[id] || '';
      });
    }

    function saveForm(feedback = true) {
      try {
        iamData.updateFormData(formKey, collectFormData());
        if (feedback) {
          showMessage('Patroon opgeslagen op dit toestel.');
        }
      } catch (error) {
        console.error(error);
        showMessage('Opslaan lukte niet.', true);
      }
    }

    function exportAll() {
      const exportData = iamData.exportJSON();
      const url = URL.createObjectURL(exportData.blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = exportData.filename;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showMessage('Volledige IAM-gegevens geëxporteerd als JSON.');
    }

    document.addEventListener('DOMContentLoaded', () => {
      fillForm(iamData.getFormData(formKey) || {});

      document.getElementById('saveButton').addEventListener('click', () => saveForm(true));
      document.getElementById('exportButton').addEventListener('click', exportAll);
      document.getElementById('printButton').addEventListener('click', () => window.print());
      document.getElementById('chemsexPatternForm').addEventListener('input', () => saveForm(false));
    });
  </script>
</body>
</html>
